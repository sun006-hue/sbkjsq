<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#24a148"><title>废品利润计算器</title><style>
:root{--g:#24a148;--gd:#157a36;--bg:#f4f7f4;--card:#fff;--line:#e2e9e3;--mut:#6d756f;--red:#c83e3e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#17201a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:560px;margin:auto;min-height:100vh;padding:0 14px 92px}.top{position:sticky;top:0;z-index:5;background:rgba(244,247,244,.94);backdrop-filter:blur(12px);padding:18px 2px 10px;border-bottom:1px solid var(--line)}h1{font-size:22px;margin:0}small,p{color:var(--mut)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 6px}.tab.on{background:var(--g);color:#fff;border-color:var(--g)}.page{display:none}.page.on{display:block}.card{background:var(--card);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 24px rgba(28,51,34,.06)}h2{font-size:17px;margin:0 0 13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{display:block;font-size:12px;color:#475149}input{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:11px;background:#fbfcfb;padding:12px;font-size:16px;outline:none}input:focus{border-color:#8fcda0;box-shadow:0 0 0 3px rgba(36,161,72,.08)}button{font:inherit}.primary{width:100%;border:0;border-radius:14px;padding:14px;background:linear-gradient(135deg,var(--g),#1c8f40);color:#fff;font-weight:700;font-size:16px}.ghost{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 10px}.danger{color:var(--red)}.result{background:linear-gradient(145deg,#fff,#eef9f1);border:1px solid #d3ead9;border-radius:18px;padding:17px;margin-top:12px}.result.loss{background:#fff3f3;border-color:#f0caca}.money{font-size:38px;font-weight:800;color:var(--g);margin:8px 0}.loss .money{color:var(--red)}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{background:rgba(255,255,255,.75);border:1px solid var(--line);border-radius:11px;padding:9px;font-size:12px;color:var(--mut)}.metric b{display:block;color:#263129;font-size:14px;margin-top:4px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fbfcfb}.itemHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}.rowbtns{display:flex;gap:8px}.summary{font-size:14px;line-height:1.8}.summary b{float:right}.rec{border:1px solid var(--line);border-radius:14px;padding:13px;margin:10px 0}.rec h3{margin:0 0 6px;font-size:16px}.rec .profit{font-size:22px;font-weight:800;color:var(--g)}.rec .profit.neg{color:var(--red)}details{margin-top:8px;color:#3f4942}pre{white-space:pre-wrap;word-break:break-word;background:#f6f8f6;padding:10px;border-radius:10px;font:12px/1.6 sans-serif}.empty{text-align:center;padding:28px 10px;color:var(--mut)}@media(max-width:380px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.money{font-size:32px}}
</style></head><body><div class="app"><header class="top"><h1>废品利润计算器</h1><small>单货按买卖价计算，厂货按整单一口价计算</small><div class="tabs"><button class="tab on" data-p="single">收单货</button><button class="tab" data-p="factory">收厂货</button><button class="tab" data-p="records">利润记录</button></div></header>
<datalist id="goods"></datalist>
<section id="single" class="page on"><div class="card"><h2>单货信息</h2><div class="grid"><label>客户/供应商<input id="sParty" placeholder="可不填"></label><label>废品名称<input id="sName" list="goods" placeholder="可选择或自己输入"></label><label>毛重（kg）<input id="sGross" type="number" min="0" step="0.001"></label><label>皮重（kg）<input id="sTare" type="number" min="0" step="0.001" value="0"></label><label>扣杂率（%）<input id="sDed" type="number" min="0" max="100" step="0.01" value="0"></label><label>收购单价（元/kg）<input id="sBuy" type="number" min="0" step="0.01"></label><label>卖出单价（元/kg）<input id="sSell" type="number" min="0" step="0.01"></label><label>运费（元）<input id="sFreight" type="number" min="0" value="0"></label><label>人工费（元）<input id="sLabor" type="number" min="0" value="0"></label><label>其他费用（元）<input id="sOther" type="number" min="0" value="0"></label></div></div><button class="primary" onclick="calcSingle()">计算利润</button><div id="sResult"></div></section>
<section id="factory" class="page"><div class="card"><h2>厂货整单信息</h2><div class="grid"><label>工厂/供应商<input id="fParty" placeholder="可不填"></label><label>整单一口收购价（元）<input id="fBuyTotal" type="number" min="0" step="0.01"></label><label>运费（元）<input id="fFreight" type="number" min="0" value="0"></label><label>人工/装卸费（元）<input id="fLabor" type="number" min="0" value="0"></label><label class="full">其他费用（元）<input id="fOther" type="number" min="0" value="0"></label></div></div><div class="card"><div class="itemHead"><h2>货品明细</h2><button class="ghost" onclick="addItem()">＋ 添加货品</button></div><div id="items"></div></div><button class="primary" onclick="calcFactory()">计算整单利润</button><div id="fResult"></div></section>
<section id="records" class="page"><div class="card"><div class="itemHead"><h2>详细利润记录</h2><button class="ghost danger" onclick="clearRecords()">清空</button></div><div id="recordList"></div></div></section></div>
<script>
const G=['废铁','统废','重废','中废','轻薄料','钢筋头','铁刨花','铁皮','生铁','废钢','201不锈钢','304不锈钢','316不锈钢','紫铜','光亮铜线','铜米','黄铜','铜管','铜铝水箱','铝合金','6063铝型材','铝线','易拉罐铝','铝屑','铅','锌','锡','废电机','废电缆','废变压器','纸箱','黄板纸','书本纸','报纸','办公废纸','花纸','牛皮纸','纸管','PET透明瓶','PET杂色瓶','HDPE塑料','LDPE塑料','PE塑料','PP塑料','PVC塑料','ABS塑料','PS塑料','亚克力','塑料膜','废旧空调','冰箱','洗衣机','电视','电脑主机','主板','电源','废旧电池','玻璃瓶','废木材','废橡胶','废旧衣物'];goods.innerHTML=G.map(x=>`<option value="${x}">`).join('');
const $=id=>document.getElementById(id),n=id=>Math.max(0,Number($(id).value)||0),fmt=x=>(Number(x)||0).toFixed(2),now=()=>new Date().toLocaleString('zh-CN',{hour12:false});let records=JSON.parse(localStorage.getItem('sbk_profit_records')||'[]');
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.page').forEach(x=>x.classList.remove('on'));b.classList.add('on');$(b.dataset.p).classList.add('on');if(b.dataset.p==='records')renderRecords()});
function save(r){records.unshift(r);localStorage.setItem('sbk_profit_records',JSON.stringify(records));alert('已保存到利润记录')}
function resultBox(d,onSave){const loss=d.profit<0;return `<div class="result ${loss?'loss':''}"><small>${loss?'预计亏损':'预计净利润'}</small><div class="money">¥${fmt(d.profit)}</div><div class="metrics"><div class="metric">结算重量<b>${fmt(d.weight)} kg</b></div><div class="metric">销售收入<b>¥${fmt(d.revenue)}</b></div><div class="metric">收购成本<b>¥${fmt(d.cost)}</b></div><div class="metric">总费用<b>¥${fmt(d.fees)}</b></div><div class="metric">毛利润<b>¥${fmt(d.grossProfit)}</b></div><div class="metric">利润率<b>${d.cost?fmt(d.profit/d.cost*100):'0.00'}%</b></div></div><button class="primary" style="margin-top:12px" onclick="${onSave}">保存详细记录</button></div>`}
let lastSingle=null,lastFactory=null;
function calcSingle(){const gross=n('sGross'),tare=n('sTare'),ded=n('sDed');if(!$('sName').value.trim())return alert('请填写废品名称');if(gross<tare)return alert('毛重不能小于皮重');if(ded>100)return alert('扣杂率不能超过100%');const net=gross-tare,weight=net*(1-ded/100),buy=n('sBuy'),sell=n('sSell'),cost=weight*buy,revenue=weight*sell,fees=n('sFreight')+n('sLabor')+n('sOther'),grossProfit=revenue-cost,profit=grossProfit-fees;lastSingle={type:'单货',date:now(),party:$('sParty').value.trim(),name:$('sName').value.trim(),gross,tare,net,ded,weight,buy,sell,cost,revenue,freight:n('sFreight'),labor:n('sLabor'),other:n('sOther'),fees,grossProfit,profit};$('sResult').innerHTML=resultBox(lastSingle,'saveSingle()')}
function saveSingle(){if(lastSingle)save(lastSingle)}
let itemSeq=0;function addItem(v={}){itemSeq++;const d=document.createElement('div');d.className='item';d.dataset.id=itemSeq;d.innerHTML=`<div class="itemHead"><b>货品 ${document.querySelectorAll('#items .item').length+1}</b><button class="ghost danger" onclick="this.closest('.item').remove()">删除</button></div><div class="grid"><label>废品名称<input class="iName" list="goods" value="${v.name||''}" placeholder="可自己输入"></label><label>卖出单价（元/kg）<input class="iSell" type="number" min="0" step="0.01" value="${v.sell||''}"></label><label>毛重（kg）<input class="iGross" type="number" min="0" step="0.001" value="${v.gross||''}"></label><label>皮重（kg）<input class="iTare" type="number" min="0" step="0.001" value="${v.tare||0}"></label><label class="full">扣杂率（%）<input class="iDed" type="number" min="0" max="100" step="0.01" value="${v.ded||0}"></label></div>`;items.appendChild(d)}addItem();
function calcFactory(){const arr=[];let revenue=0,weight=0;for(const el of document.querySelectorAll('#items .item')){const name=el.querySelector('.iName').value.trim(),gross=+el.querySelector('.iGross').value||0,tare=+el.querySelector('.iTare').value||0,ded=+el.querySelector('.iDed').value||0,sell=+el.querySelector('.iSell').value||0;if(!name)continue;if(gross<tare)return alert(name+'：毛重不能小于皮重');if(ded<0||ded>100)return alert(name+'：扣杂率应在0到100%');const net=gross-tare,w=net*(1-ded/100),amount=w*sell;arr.push({name,gross,tare,net,ded,weight:w,sell,revenue:amount});weight+=w;revenue+=amount}if(!arr.length)return alert('请至少填写一种货品');const cost=n('fBuyTotal'),fees=n('fFreight')+n('fLabor')+n('fOther'),grossProfit=revenue-cost,profit=grossProfit-fees;lastFactory={type:'厂货',date:now(),party:$('fParty').value.trim(),items:arr,weight,revenue,cost,freight:n('fFreight'),labor:n('fLabor'),other:n('fOther'),fees,grossProfit,profit};$('fResult').innerHTML=resultBox(lastFactory,'saveFactory()')}
function saveFactory(){if(lastFactory)save(lastFactory)}
function detail(r){if(r.type==='单货')return `客户/供应商：${r.party||'-'}\n货品：${r.name}\n毛重：${fmt(r.gross)} kg\n皮重：${fmt(r.tare)} kg\n净重：${fmt(r.net)} kg\n扣杂率：${fmt(r.ded)}%\n结算重量：${fmt(r.weight)} kg\n收购单价：¥${fmt(r.buy)}/kg\n卖出单价：¥${fmt(r.sell)}/kg\n收购成本：¥${fmt(r.cost)}\n销售收入：¥${fmt(r.revenue)}\n运费：¥${fmt(r.freight)}\n人工费：¥${fmt(r.labor)}\n其他费用：¥${fmt(r.other)}\n毛利润：¥${fmt(r.grossProfit)}\n净利润：¥${fmt(r.profit)}`;return `工厂/供应商：${r.party||'-'}\n整单一口价：¥${fmt(r.cost)}\n总销售收入：¥${fmt(r.revenue)}\n总费用：¥${fmt(r.fees)}\n净利润：¥${fmt(r.profit)}\n\n货品明细：\n`+r.items.map((x,i)=>`${i+1}. ${x.name}\n毛重 ${fmt(x.gross)} kg，皮重 ${fmt(x.tare)} kg，扣杂 ${fmt(x.ded)}%\n结算重量 ${fmt(x.weight)} kg，卖价 ¥${fmt(x.sell)}/kg，销售额 ¥${fmt(x.revenue)}`).join('\n\n')}
function renderRecords(){recordList.innerHTML=records.length?records.map((r,i)=>`<div class="rec"><div class="itemHead"><div><h3>${r.type} · ${r.type==='单货'?r.name:(r.party||'厂货整单')}</h3><small>${r.date}</small></div><button class="ghost danger" onclick="delRecord(${i})">删除</button></div><div class="profit ${r.profit<0?'neg':''}">¥${fmt(r.profit)}</div><small>结算重量 ${fmt(r.weight)} kg · 收入 ¥${fmt(r.revenue)} · 成本 ¥${fmt(r.cost)}</small><details><summary>查看完整重量、单价和利润明细</summary><pre>${detail(r)}</pre></details></div>`).join(''):'<div class="empty">还没有利润记录</div>'}
function delRecord(i){if(confirm('删除这条记录？')){records.splice(i,1);localStorage.setItem('sbk_profit_records',JSON.stringify(records));renderRecords()}}function clearRecords(){if(records.length&&confirm('清空全部利润记录？')){records=[];localStorage.removeItem('sbk_profit_records');renderRecords()}}
</script></body></html>
